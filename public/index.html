<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Glass Factory</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="stylesheet" href="/mobile-shell.css">
</head>
<body>
  <div class="mobile-app">
    <div class="page-body" style="padding-top:24px">
      <div class="hero">
        <div class="hero-card">
          <div class="eyebrow">Glass Factory</div>
          <div class="hero-title">三端统一入口</div>
          <div class="hero-sub">客户端、业务台和管理端都已经切成移动优先界面，你可以从这里直接进入对应角色入口。</div>
          <div class="action-grid">
            <a class="action-card" href="/app">
              <strong>客户端</strong>
              <span>查看订单、账款、提货进度和导出 PDF。</span>
            </a>
            <a class="action-card" href="/platform">
              <strong>业务台</strong>
              <span>订单确认、工序推进、提货签收和客户管理。</span>
            </a>
            <a class="action-card" href="/admin">
              <strong>管理端</strong>
              <span>经营概览、运行告警、权限检查和回放操作。</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
